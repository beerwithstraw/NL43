# ============================================================
# NL-43 Extraction Pipeline Configuration
# Edit this file before running: python3 pipeline.py
# ============================================================

base_path: "/Users/pulkit/Desktop/Forms"

fiscal_years:
  - FY2025
  - FY2026

quarters: all

master_sheet_path: "/Users/pulkit/Desktop/Forms/NL43_Master.xlsx"
processed_log_path: "/Users/pulkit/Desktop/Forms/.NL43_processed_log.json"

# 'dynamic' = auto-detect NL-43 section in consolidated PDFs
# 'skip'    = ignore consolidated PDFs
consolidated_mode: dynamic

nl43_keywords:
  - "NL-43"
  - "RURAL & SOCIAL"
  - "SUM ASSURED"       # table header — reliably extracted even from columnar PDFs
  - "LINE OF BUSINESS"  # table header — not present in TOC pages
  - "NO. OF POLICIES"   # table header — partial match covers split "POLICIES ISSUED"
  - "POLICIES ISSUED"   # exact match when pdfplumber joins columns
  - "PREMIUM COLLECTED" # exact match when pdfplumber joins columns

# TOC pages match 2 (NL-43 + RURAL & SOCIAL); real form pages match 3+.
# Table-header keywords (SUM ASSURED, LINE OF BUSINESS) anchor detection
# for companies where POLICIES ISSUED / PREMIUM COLLECTED are split by columns.
nl43_keyword_min_matches: 3

# Per-company overrides (optional).
# min_matches: raise threshold to skip TOC pages that already match the global minimum.
# start/end: hard 1-indexed page override (bypasses keyword detection entirely).
nl43_page_overrides:
  care_health:
    min_matches: 2   # NL-43 page omits "RURAL & SOCIAL" phrase; only NL-43 + SUM ASSURED visible
  IFFCO_TOKIO: {"start": 81, "end": 81}